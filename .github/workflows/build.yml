name: Build and Release

on:
  pull_request:
    branches: [ main, master ]
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a release'
        required: true
        type: boolean
        default: false

jobs:
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
    
    - name: Install mise
      uses: jdx/mise-action@v4.0.0
    
    - name: Run linting
      run: mise run lint-check

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
    
    - name: Install mise
      uses: jdx/mise-action@v4.0.0
    
    - name: Install dependencies
      run: mise run install
    
    - name: Run tests
      run: mise run test

  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
    
    - name: Install mise
      uses: jdx/mise-action@v4.0.0
    
    - name: Build vnet-flow-logs package
      run: mise run build-vnet
    
    - name: Build nsg-flow-logs package
      run: mise run build-nsg
    
    - name: Upload vnet artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: vnet-flow-logs-package
        path: vnet-flow-logs/vnet.zip
        retention-days: 30
    
    - name: Upload nsg artifact
      uses: actions/upload-artifact@v7.0.0
      with:
        name: nsg-flow-logs-package
        path: nsg-flow-logs/nsg.zip
        retention-days: 30

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: |
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6.0.2
      with:
        fetch-depth: 0
    
    - name: Get latest tag
      id: get_tag
      run: |
        # Get the latest tag, or use v0.0.0 if no tags exist
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
        echo "Latest tag: $LATEST_TAG"
    
    - name: Bump version
      id: bump_version
      run: |
        LATEST_TAG="${{ steps.get_tag.outputs.latest_tag }}"
        # Remove 'v' prefix if present
        VERSION=${LATEST_TAG#v}
        
        # Split version into parts
        IFS='.' read -r -a VERSION_PARTS <<< "$VERSION"
        MAJOR=${VERSION_PARTS[0]:-0}
        MINOR=${VERSION_PARTS[1]:-0}
        PATCH=${VERSION_PARTS[2]:-0}
        
        # Bump minor version
        MINOR=$((MINOR + 1))
        
        NEW_VERSION="v${MAJOR}.${MINOR}.0"
        echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "New version: $NEW_VERSION"
    
    - name: Get last commit message
      id: get_commit_msg
      run: |
        # Get the last non-merge commit message
        if [[ "${{ github.event_name }}" == "push" ]]; then
          # For push events, get the commit message before the merge commit
          COMMIT_MSG=$(git log --no-merges -1 --pretty=%B)
        else
          # For manual workflow dispatch, get the latest commit
          COMMIT_MSG=$(git log -1 --pretty=%B)
        fi
        
        # Save to file to handle multiline messages
        echo "$COMMIT_MSG" > commit_message.txt
        echo "Commit message saved to commit_message.txt"
    
    - name: Download vnet artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: vnet-flow-logs-package
        path: ./artifacts
    
    - name: Download nsg artifact
      uses: actions/download-artifact@v8.0.1
      with:
        name: nsg-flow-logs-package
        path: ./artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v2.6.1
      with:
        tag_name: ${{ steps.bump_version.outputs.new_version }}
        name: Release ${{ steps.bump_version.outputs.new_version }}
        body_path: commit_message.txt
        draft: false
        prerelease: false
        files: |
          ./artifacts/vnet.zip
          ./artifacts/nsg.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
